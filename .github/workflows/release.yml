name: Build & Release

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p artifacts
          cp target/release/ccpm artifacts/ccpm-linux-x86_64
          cp install.sh artifacts/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccpm-linux-x86_64
          path: artifacts/
          if-no-files-found: error

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        shell: pwsh
        run: cargo build --release

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item target/release/ccpm.exe artifacts/ccpm-windows-x86_64.exe
          Get-FileHash artifacts/ccpm-windows-x86_64.exe -Algorithm SHA256 | `
            Select-Object @{N="File";E={$_.Path}}, Hash | `
            Export-Csv -NoTypeInformation artifacts/ccpm-windows-x86_64.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccpm-windows-x86_64
          path: artifacts/
          if-no-files-found: error

  # 创建 Release（仅在打标签时）
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Generate checksums
        run: |
          cd dist-artifacts
          find . -type f ! -name '*.sha256' -exec sha256sum {} \; > ../sha256sums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## ccpm ${{ github.ref_name }}

            ### 下载
            | 平台 | 文件 |
            |---|---|
            | Linux x86_64 | `ccpm-linux-x86_64` |
            | Windows x86_64 | `ccpm-windows-x86_64.exe` |

            详情见 [README](https://github.com/${{ github.repository }}/blob/main/README.md)。
          files: |
            dist-artifacts/ccpm-linux-x86_64/ccpm-linux-x86_64
            dist-artifacts/ccpm-windows-x86_64/ccpm-windows-x86_64.exe
            dist-artifacts/ccpm-windows-x86_64/ccpm-windows-x86_64.exe.sha256
            sha256sums.txt
          fail_on_unmatched_files: true