name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/release/ccpm artifacts/ccpm-linux-x86_64
          cp install.sh artifacts/
          cd artifacts
          sha256sum ccpm-linux-x86_64 install.sh > sha256sums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccpm-linux
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ccpm-linux
          path: upload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upload/ccpm-linux-x86_64
            upload/install.sh
            upload/sha256sums.txt
          generate_release_notes: true