name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            suffix: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/ccpm${{ matrix.suffix }} artifacts/
          cp install.sh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccpm-${{ matrix.target }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive
        run: |
          cd artifacts/ccpm-x86_64-unknown-linux-gnu
          mv ccpm ccpm-linux-x86_64
          mv install.sh install.sh
          cd ../..
          mv artifacts/ccpm-aarch64-unknown-linux-gnu/ccpm ccpm-linux-aarch64 2>/dev/null || true
          mv artifacts/ccpm-x86_64-pc-windows-gnu/ccpm.exe ccpm-windows-x86_64.exe 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../sha256sums.txt
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ccpm-x86_64-unknown-linux-gnu/ccpm-linux-x86_64
            artifacts/ccpm-aarch64-unknown-linux-gnu/ccpm-linux-aarch64
            artifacts/ccpm-x86_64-pc-windows-gnu/ccpm-windows-x86_64.exe
            artifacts/ccpm-x86_64-unknown-linux-gnu/install.sh
            sha256sums.txt
          generate_release_notes: true